name: Integration test — logs-dispatcher + logs-concentrator

permissions:
  contents: read

# Triggered whenever either service or the test harness itself changes.
# Builds both images and verifies that events flow end-to-end through the
# pipeline. Intentionally separate from the publish workflows so it runs on
# PRs without needing registry credentials.

on:
  push:
    branches:
      - 'main'
      - 'build-image'
    paths:
      - 'logs-dispatcher/**'
      - 'logs-concentrator/**'
      - 'test/logs-dispatcher-concentrator/**'
      - '.github/workflows/logs-integration-test.yaml'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'logs-dispatcher/**'
      - 'logs-concentrator/**'
      - 'test/logs-dispatcher-concentrator/**'
      - '.github/workflows/logs-integration-test.yaml'

jobs:
  integration-test-bats:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout PR
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ github.event_name == 'pull_request' }}
        with:
          fetch-depth: "0"
          ref: ${{ github.event.pull_request.head.sha }}
      - 
        name: Checkout Branch or Tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ github.event_name != 'pull_request' }}
        with:
          fetch-depth: "0"
      - 
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Build for linux/amd64 (the only platform the fluent/fluentd base image
      # publishes) and load directly into the local Docker daemon.
      - 
        name: Build logs-dispatcher image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: logs-dispatcher
          platforms: linux/amd64
          load: true
          tags: lagoon/logs-dispatcher:test
      - 
        name: Build logs-concentrator image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: logs-concentrator
          platforms: linux/amd64
          load: true
          tags: lagoon/logs-concentrator:test
      - 
        name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@64bb52ce84da6455bdbd6df88ac86151ba2ff16c # main
      - 
        name: Install homebrew packages
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
          HOMEBREW_NO_ENV_HINTS: 1
        run: |
          brew install bats-core
      - 
        name: Run integration tests (bats)
        env:
          DISPATCHER_IMAGE: lagoon/logs-dispatcher:test
          CONCENTRATOR_IMAGE: lagoon/logs-concentrator:test
          SKIP_BUILD: "true"
        run: |
          bats --tap test/logs-dispatcher-concentrator/logs-pipeline.bats
      - 
        name: Dump compose logs on failure
        if: failure()
        run: |
          cd test/logs-dispatcher-concentrator
          # Find any lingering test project and dump its logs.
          docker compose ls --format json 2>/dev/null \
            | grep -o '"logs-test-bats-[^"]*"' \
            | tr -d '"' \
            | while read -r proj; do
                docker compose -p "$proj" \
                  -f docker-compose.yml \
                  logs --no-color 2>/dev/null || true
              done
