# vi: ft=fluentd
# Test configuration for logs-concentrator.
# Replaces the production configmap-mounted config with a minimal working
# equivalent.  All received events are written to both stdout (visible in
# `docker compose logs`) and a JSON file on a mounted volume so the test
# harness can do deterministic string-based verification.

<system>
  workers 1
</system>

# Accept forwarded events from the dispatcher.
<source>
  @type forward
  @id   in_forward
  port  24224
  bind  0.0.0.0
</source>

# Expose the monitor agent for the health-check.
<source>
  @type monitor_agent
  @id   in_monitor
  port  24220
  bind  0.0.0.0
</source>

# Fan out to stdout (for `docker compose logs` inspection) and to a file
# (for deterministic assertion in the test script).
<match **>
  @type  copy
  @id    out_copy

  <store>
    @type stdout
    @id   out_stdout
  </store>

  <store>
    @type   file
    @id     out_file
    path    /fluentd/log/test-output
    append  true
    <format>
      @type json
    </format>
    <buffer>
      flush_mode         immediate
      flush_thread_count 1
    </buffer>
  </store>
</match>
