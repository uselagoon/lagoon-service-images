# vi: ft=fluentd
# Test configuration for logs-dispatcher.
# Replaces the production configmap-mounted config with a minimal working
# equivalent that exercises the forward-in → forward-out chain without
# any cloud credentials or a Kubernetes API.

<system>
  workers 1
</system>

# Accept logs over HTTP so the test harness can inject events with plain curl.
<source>
  @type http
  @id   in_http
  port  9880
  bind  0.0.0.0
</source>

# Also listen on the standard Fluentd forward port so the image's
# default behaviour (forward-in) is verified.
<source>
  @type forward
  @id   in_forward
  port  24224
  bind  0.0.0.0
</source>

# Expose the monitor agent so the health-check can verify the worker is up.
<source>
  @type monitor_agent
  @id   in_monitor
  port  24220
  bind  0.0.0.0
</source>

# Forward everything to the concentrator over the Docker-internal network.
<match **>
  @type    forward
  @id      out_forward

  send_timeout  60s
  recover_wait  10s
  hard_timeout  60s

  <server>
    host logs-concentrator
    port 24224
  </server>

  <buffer>
    flush_mode     interval
    flush_interval 1s
  </buffer>
</match>
